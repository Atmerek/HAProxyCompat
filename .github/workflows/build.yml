name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - subproject: neoforge-1.21
            java-version: '21'
          - subproject: neoforge-26.1
            java-version: '21'
          - subproject: neoforge-26.2
            java-version: '21'
          - subproject: fabric-1.21
            java-version: '21'
          - subproject: fabric-26.1
            java-version: '25'
          - subproject: fabric-26.2
            java-version: '25'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :${{ matrix.subproject }}:build --no-daemon --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: haproxycompat-${{ matrix.subproject }}
          path: versions/${{ matrix.subproject }}/build/libs/*.jar
          if-no-files-found: error
