name: Release (Fabric 1.21.x)

on:
  push:
    tags: [ 'v*-fabric-1.21' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :fabric-1.21:build --no-daemon --stacktrace

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          JAR=$(ls versions/fabric-1.21/build/libs/*.jar | grep -v '\-dev\.' | grep -v '\-sources\.' | head -1)
          gh release create "$TAG" "$JAR" \
            --title "$TAG" \
            --generate-notes \
            || gh release upload "$TAG" "$JAR" --clobber

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew :fabric-1.21:modrinth --no-daemon
