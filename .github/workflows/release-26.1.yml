name: Release (26.1.x)

on:
  push:
    tags: [ 'v*-26.1' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :neoforge-26.1:build --no-daemon --stacktrace

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" neoforge-26.1/build/libs/*.jar \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || gh release upload "${{ github.ref_name }}" neoforge-26.1/build/libs/*.jar --clobber

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew :neoforge-26.1:modrinth --no-daemon
