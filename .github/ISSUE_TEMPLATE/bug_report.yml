name: Bug Report
description: Report a problem with HAProxyCompat
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, please confirm you are running the mod on a dedicated server behind a reverse proxy.

  - type: dropdown
    id: loader
    attributes:
      label: Mod loader
      options:
        - NeoForge
        - Fabric
    validations:
      required: true

  - type: input
    id: mc_version
    attributes:
      label: Minecraft version
      placeholder: "e.g. 1.21.1"
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: HAProxyCompat version
      placeholder: "e.g. 1.0.1"
    validations:
      required: true

  - type: input
    id: proxy
    attributes:
      label: Reverse proxy software
      placeholder: "e.g. HAProxy 2.9, Nginx, FRP"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include what you expected to happen vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any related server log output here.
      render: text
